# SwiftLint — strict profile with project-specific tuning
# Run: swiftlint lint --strict Sources/ Tests/

strict: true

included:
  - Sources
  - Tests

excluded:
  - .build
  - .claude

# Enable all opt-in rules, then disable the ones that don't fit
opt_in_rules:
  - array_init
  - closure_body_length
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - comma_inheritance
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - convenience_type
  - discouraged_assert
  - discouraged_none_name
  - discouraged_object_literal
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - explicit_init
  - fallthrough
  - fatal_error_message
  - file_name_no_space
  - first_where
  - flatmap_over_map_reduce
  - force_unwrapping
  - identical_operands
  - implicit_return
  - implicitly_unwrapped_optional
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - literal_expression_end_indentation
  - local_doc_comment
  - lower_acl_than_parent
  - modifier_order
  - multiline_arguments
  - multiline_function_chains
  - multiline_literal_brackets
  - multiline_parameters
  - number_separator
  - operator_usage_whitespace
  - optional_enum_case_matching
  - overridden_super_call
  - pattern_matching_keywords
  - prefer_self_in_static_references
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - private_action
  - private_outlet
  - private_subject
  - prohibited_super_call
  - raw_value_for_camel_cased_codable_enum
  - reduce_into
  - redundant_nil_coalescing
  - redundant_type_annotation
  - return_value_from_void_function
  - self_binding
  - shorthand_optional_binding
  - sorted_first_last
  - static_operator
  - strong_iboutlet
  - toggle_bool
  - trailing_closure
  - unavailable_function
  - unhandled_throwing_task
  - unneeded_parentheses_in_closure_argument
  - unowned_variable_capture
  - untyped_error_in_catch
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - yoda_condition

# Project tuning — systems code uses short names (fd, n, pid) and long lines
identifier_name:
  min_length:
    warning: 1
  max_length:
    warning: 60
    error: 80
  excluded:
    - id
    - ok

line_length:
  warning: 150
  error: 350
  ignores_urls: true
  ignores_comments: true
  ignores_interpolated_strings: true

type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 600
  error: 800
  ignore_comment_only_lines: true

function_body_length:
  warning: 60
  error: 100

function_parameter_count:
  warning: 8
  error: 10

cyclomatic_complexity:
  warning: 15
  error: 25

large_tuple:
  warning: 4
  error: 5

closure_body_length:
  warning: 30
  error: 50

force_try:
  severity: warning

force_unwrapping:
  severity: warning

# Noisy or conflicts with SwiftFormat — disable
disabled_rules:
  - number_separator
  - implicitly_unwrapped_optional
  - vertical_parameter_alignment_on_call
  - multiline_arguments
  - trailing_comma
